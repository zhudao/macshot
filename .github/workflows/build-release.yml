name: Build, Sign & Release

# Triggers on tag push or manual dispatch
on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-beta.*"
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v3.8.0-beta.2)'
        required: true

jobs:
  release:
    runs-on: macos-15        # Xcode 16 + macOS 15 runner
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      # ── 2. Parse version from tag ──────────────────────────────────────────
      - name: Set version
        run: |
          # Use manual input tag if workflow_dispatch, otherwise use the pushed tag
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"   # strip leading 'v'
          BUILD_NUMBER="${{ github.run_number }}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV
          if [[ "$VERSION" == *"-beta"* ]]; then
            echo "IS_BETA=true" >> $GITHUB_ENV
          else
            echo "IS_BETA=false" >> $GITHUB_ENV
          fi

      # ── 3. Import Developer ID certificate into a temporary keychain ───────
      - name: Import signing certificate
        env:
          CERT_P12_BASE64:  ${{ secrets.DEVELOPER_ID_CERT_P12 }}
          CERT_PASSWORD:    ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          echo "$CERT_P12_BASE64" | base64 --decode > /tmp/cert.p12

          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASS="$(openssl rand -hex 16)"

          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 3600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"

          security import /tmp/cert.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productbuild

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH"     >> $GITHUB_ENV
          echo "KEYCHAIN_PASS=$KEYCHAIN_PASS"     >> $GITHUB_ENV

          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep "Developer ID Application" \
            | sed -E 's/.*"(.+)"/\1/' | head -1)
          echo "SIGNING_IDENTITY=$IDENTITY"       >> $GITHUB_ENV

          rm /tmp/cert.p12

      # ── 4. Resolve SPM packages + Build ───────────────────────────────────
      - name: Build
        run: |
          xcodebuild \
            -project macshot.xcodeproj \
            -scheme macshot \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -resolvePackageDependencies

          xcodebuild \
            -project macshot.xcodeproj \
            -scheme macshot \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            build

      # ── 5. Sign the .app with Developer ID ────────────────────────────────
      - name: Sign app
        run: |
          APP="build/Build/Products/Release/macshot.app"

          # Sparkle's XPC services (Installer.xpc, Downloader.xpc) must NOT be sandboxed.
          # They ship with empty entitlements so they can write to /Applications to replace
          # the app bundle during updates. We must sign them WITHOUT the app's sandbox
          # entitlements, and we must not use --deep on the outer app (which would re-sign
          # them with the parent's entitlements).
          #
          # Signing order: innermost → outermost.

          # 1. Sign XPC services (no entitlements — intentionally unsandboxed)
          find "$APP/Contents" -name "*.xpc" -print0 | while IFS= read -r -d '' xpc; do
            echo "Signing XPC: $xpc"
            codesign --force --options runtime \
              --sign "$SIGNING_IDENTITY" \
              --keychain "$KEYCHAIN_PATH" "$xpc"
          done

          # 2. Sign helper apps (Sparkle's Updater.app)
          find "$APP/Contents" -name "*.app" -print0 | while IFS= read -r -d '' helper; do
            echo "Signing helper: $helper"
            codesign --force --options runtime \
              --sign "$SIGNING_IDENTITY" \
              --keychain "$KEYCHAIN_PATH" "$helper"
          done

          # 3. Sign standalone executables (Sparkle's Autoupdate)
          AUTOUPDATE="$APP/Contents/Frameworks/Sparkle.framework/Versions/B/Autoupdate"
          if [ -f "$AUTOUPDATE" ]; then
            echo "Signing Autoupdate"
            codesign --force --options runtime \
              --sign "$SIGNING_IDENTITY" \
              --keychain "$KEYCHAIN_PATH" "$AUTOUPDATE"
          fi

          # 4. Sign dylibs
          find "$APP/Contents" -name "*.dylib" -print0 | while IFS= read -r -d '' f; do
            echo "Signing dylib: $f"
            codesign --force --options runtime \
              --sign "$SIGNING_IDENTITY" \
              --keychain "$KEYCHAIN_PATH" "$f"
          done

          # 5. Sign frameworks (seals the already-signed nested code)
          find "$APP/Contents" -name "*.framework" -print0 | while IFS= read -r -d '' f; do
            echo "Signing framework: $f"
            codesign --force --options runtime \
              --sign "$SIGNING_IDENTITY" \
              --keychain "$KEYCHAIN_PATH" "$f"
          done

          # 6. Sign the main app with its sandbox entitlements (no --deep!)
          echo "Signing main app"
          codesign --force --options runtime \
            --sign "$SIGNING_IDENTITY" \
            --keychain "$KEYCHAIN_PATH" \
            --entitlements macshot/macshot.entitlements \
            "$APP"

          # 7. Verify everything
          codesign --verify --deep --strict "$APP"
          echo "✅ Signing verified"

          # 8. Confirm XPC services are NOT sandboxed
          for xpc in $(find "$APP/Contents" -name "*.xpc"); do
            ENT=$(codesign -d --entitlements - "$xpc" 2>&1 || true)
            if echo "$ENT" | grep -q "app-sandbox"; then
              echo "❌ ERROR: $xpc has sandbox entitlements — updates will fail!"
              exit 1
            fi
            echo "✅ $(basename $xpc): no sandbox (correct)"
          done

      # ── 6. Package into DMG ────────────────────────────────────────────────
      - name: Package DMG
        run: |
          brew install create-dmg
          # Stage the .app in a folder (create-dmg copies folder contents into DMG)
          mkdir -p /tmp/dmg-staging
          cp -R "build/Build/Products/Release/macshot.app" /tmp/dmg-staging/
          # create-dmg returns exit code 2 if it can't set the volume icon
          # (no .icns at the root), which is fine — the app icon shows up anyway.
          create-dmg \
            --volname "macshot" \
            --background "assets/dmg-background.png" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "macshot.app" 150 185 \
            --app-drop-link 450 185 \
            --no-internet-enable \
            --hide-extension "macshot.app" \
            MacShot.dmg \
            /tmp/dmg-staging \
            || [ $? -eq 2 ]

      # ── 7. Notarize ────────────────────────────────────────────────────────
      - name: Notarize
        env:
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY }}
          ASC_API_KEY_ID:     ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID:  ${{ secrets.ASC_API_ISSUER_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_API_KEY_BASE64" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${ASC_API_KEY_ID}.p8

          xcrun notarytool submit MacShot.dmg \
            --key ~/.appstoreconnect/private_keys/AuthKey_${ASC_API_KEY_ID}.p8 \
            --key-id "$ASC_API_KEY_ID" \
            --issuer "$ASC_API_ISSUER_ID" \
            --wait \
            --timeout 20m

          xcrun stapler staple MacShot.dmg

          echo "✅ Notarization complete"

          rm -f ~/.appstoreconnect/private_keys/AuthKey_${ASC_API_KEY_ID}.p8

      # ── 8. Get SHA256 for Homebrew ─────────────────────────────────────────
      - name: Compute SHA256
        run: |
          SHA256=$(shasum -a 256 MacShot.dmg | awk '{print $1}')
          echo "SHA256=$SHA256" >> $GITHUB_ENV
          echo "SHA256: $SHA256"

      # ── 9. Extract changelog entry for this version ───────────────────────
      - name: Extract release notes
        run: |
          awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" \
            CHANGELOG.md > release_notes.md
          cat release_notes.md

      # ── 10. Sign DMG for Sparkle and update appcast ───────────────────────
      - name: Write appcast helper scripts
        run: |
          python3 << 'PYEOF'
          import textwrap, pathlib
          pathlib.Path("/tmp/extract_stable.py").write_text(textwrap.dedent("""\
              import xml.etree.ElementTree as ET
              ET.register_namespace('sparkle', 'http://www.andymatuschak.org/xml-namespaces/sparkle')
              ns = {'sparkle': 'http://www.andymatuschak.org/xml-namespaces/sparkle'}
              tree = ET.parse('appcast.xml')
              stable = []
              for item in tree.findall('.//item'):
                  if item.find('sparkle:channel', ns) is None:
                      stable.append(ET.tostring(item, encoding='unicode'))
              with open('/tmp/stable_items.xml', 'w') as f:
                  f.write('\\n'.join(stable))
          """))
          pathlib.Path("/tmp/build_item.py").write_text(textwrap.dedent("""\
              import sys
              version, build_number, date, channel, html, url, size, sig = sys.argv[1:9]
              channel_line = f'    <sparkle:channel>{channel}</sparkle:channel>' if channel else ''
              with open('/tmp/new_item.xml', 'w') as f:
                  f.write(f'''<item>
                  <title>v{version}</title>
                  <pubDate>{date}</pubDate>
                  <sparkle:version>{build_number}</sparkle:version>
                  <sparkle:shortVersionString>{version}</sparkle:shortVersionString>
                  <sparkle:minimumSystemVersion>12.3</sparkle:minimumSystemVersion>
              {channel_line}
                  <description><![CDATA[
                    <style>
                      body {{ font-family: -apple-system, sans-serif; font-size: 13px; padding: 12px; }}
                      h3 {{ font-size: 14px; margin: 12px 0 6px 0; }}
                      h3:first-child {{ margin-top: 0; }}
                      ul {{ padding-left: 18px; margin: 4px 0; }}
                      li {{ margin: 4px 0; line-height: 1.5; }}
                    </style>
                    {html}
                  ]]></description>
                  <enclosure
                      url="{url}"
                      length="{size}"
                      type="application/octet-stream"
                      sparkle:edSignature="{sig}"
                  />
              </item>''')
          """))
          pathlib.Path("/tmp/assemble_appcast.py").write_text(textwrap.dedent("""\
              import sys, os
              is_beta = sys.argv[1] == 'true'
              stable = ''
              if is_beta and os.path.exists('/tmp/stable_items.xml'):
                  stable = open('/tmp/stable_items.xml').read().strip()
              new_item = open('/tmp/new_item.xml').read().strip()
              parts = [p for p in [stable, new_item] if p]
              items = '\\n'.join(parts)
              with open('appcast.xml', 'w') as f:
                  f.write(f'''<?xml version="1.0" encoding="utf-8"?>
              <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
                  <channel>
                      <title>macshot</title>
                      <link>https://github.com/sw33tLie/macshot</link>
                      <description>macshot updates</description>
              {items}
                  </channel>
              </rss>
              ''')
          """))
          PYEOF

      - name: Update Sparkle appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          # Download Sparkle tools
          SPARKLE_VERSION="2.6.4"
          curl -L -o /tmp/Sparkle.tar.xz \
            "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz"
          mkdir -p /tmp/sparkle
          tar -xf /tmp/Sparkle.tar.xz -C /tmp/sparkle

          # Sign the DMG with Sparkle's EdDSA key
          echo "$SPARKLE_PRIVATE_KEY" > /tmp/sparkle_key
          SIGN_OUTPUT=$(/tmp/sparkle/bin/sign_update MacShot.dmg --ed-key-file /tmp/sparkle_key)
          rm -f /tmp/sparkle_key
          echo "Sparkle signature output: $SIGN_OUTPUT"

          # Parse: sparkle:edSignature="..." length="..."
          ED_SIG=$(echo "$SIGN_OUTPUT" | sed -n 's/.*edSignature="\([^"]*\)".*/\1/p')
          FILESIZE=$(stat -f%z MacShot.dmg)
          DOWNLOAD_URL="https://github.com/sw33tLie/macshot/releases/download/v${VERSION}/MacShot.dmg"
          DATE=$(date -R)

          # Convert release notes markdown to HTML for Sparkle update dialog
          RELEASE_HTML=""
          if [ -s release_notes.md ]; then
            RELEASE_HTML=$(sed -E \
              -e 's/^### (.+)/<\/ul><h3>\1<\/h3><ul>/' \
              -e 's/^- \*\*([^*]+)\*\* [-–] (.+)/<li><b>\1<\/b> — \2<\/li>/' \
              -e 's/^- \*\*([^*]+)\*\*(.*)/<li><b>\1<\/b>\2<\/li>/' \
              -e 's/^- (.+)/<li>\1<\/li>/' \
              release_notes.md | tr '\n' ' ')
            # Clean up: remove leading </ul>, add trailing </ul>
            RELEASE_HTML=$(echo "$RELEASE_HTML" | sed -E \
              -e 's|^ *</ul> *||' \
              -e 's| *$|</ul>|')
          fi

          # Build the new <item> block
          CHANNEL=""
          if [ "$IS_BETA" = "true" ]; then
            CHANNEL="beta"
          fi

          python3 /tmp/build_item.py "$VERSION" "$BUILD_NUMBER" "$DATE" "$CHANNEL" "$RELEASE_HTML" "$DOWNLOAD_URL" "$FILESIZE" "$ED_SIG"
          NEW_ITEM=$(cat /tmp/new_item.xml)

          # Merge into appcast.xml:
          # - Beta release: keep existing stable item, replace any previous beta item
          # - Stable release: replace everything (stable is now the latest, drop old beta)

          # Write new item to a temp file for clean assembly
          echo "$NEW_ITEM" > /tmp/new_item.xml

          if [ "$IS_BETA" = "true" ] && [ -f appcast.xml ]; then
            python3 /tmp/extract_stable.py 2>/dev/null || echo "" > /tmp/stable_items.xml
          else
            echo "" > /tmp/stable_items.xml
          fi

          python3 /tmp/assemble_appcast.py "$IS_BETA"

          # Validate appcast XML before proceeding — abort if malformed
          python3 -c "import xml.etree.ElementTree as ET; ET.parse('appcast.xml')" || {
            echo "❌ ERROR: appcast.xml is not valid XML — aborting to protect user updates"
            exit 1
          }
          echo "✅ Appcast generated and validated"
          cat appcast.xml

      # ── 11. Create GitHub Release ──────────────────────────────────────────
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "v$VERSION" --yes 2>/dev/null || true
          PRERELEASE_FLAG=""
          if [ "$IS_BETA" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "v$VERSION" MacShot.dmg \
            --title "v$VERSION" \
            --notes-file release_notes.md \
            $PRERELEASE_FLAG

      # ── 12. Commit appcast.xml to main ─────────────────────────────────────
      - name: Commit appcast + update website version
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Save the generated appcast before switching branches
          cp appcast.xml /tmp/appcast.xml
          git fetch origin main
          git checkout -f main
          cp /tmp/appcast.xml appcast.xml
          if [ "$IS_BETA" = "false" ]; then
            sed -i '' "s/v[0-9][0-9]*\.[0-9][0-9]*\.[0-9][0-9]*/v${VERSION}/" website/index.html
            git add website/index.html
          fi
          git add appcast.xml
          git diff --cached --quiet && echo "No changes" || {
            git commit -m "ci: update appcast.xml for v${VERSION}"
            git push origin main
          }

      # ── 13. Update Homebrew formula (personal tap) ─────────────────────────
      - name: Update Homebrew formula
        if: env.IS_BETA == 'false'
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git clone https://x-access-token:${GH_TOKEN}@github.com/sw33tLie/homebrew-macshot.git /tmp/tap

          sed -i '' \
            -e "s/version \".*\"/version \"$VERSION\"/" \
            -e "s/sha256 \".*\"/sha256 \"$SHA256\"/" \
            /tmp/tap/Casks/macshot.rb

          cd /tmp/tap
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/macshot.rb
          git commit -m "macshot $VERSION"
          git push

      # ── 14. Bump homebrew-cask (official) ──────────────────────────────────
      - name: Bump homebrew-cask
        if: env.IS_BETA == 'false'
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          brew tap homebrew/cask 2>/dev/null || true
          brew bump-cask-pr macshot \
            --version "$VERSION" \
            --sha256 "$SHA256" \
            --no-browse \
            || echo "⚠️ homebrew-cask bump failed (cask may not exist yet or is already up to date)"

      # ── 15. Cleanup keychain ────────────────────────────────────────────────
      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
