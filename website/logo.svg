<?xml version="1.0" encoding="utf-8" ?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- Background gradient (unchanged) -->
    <linearGradient id="gradient_0" gradientUnits="userSpaceOnUse" x1="512.54791" y1="883.62695" x2="512.15851" y2="141.37401">
      <stop offset="0" stop-color="#211BEF"/>
      <stop offset="1" stop-color="#3D7CFB"/>
    </linearGradient>

    <!-- Inner circle gradient (unchanged) -->
    <linearGradient id="gradient_1" gradientUnits="userSpaceOnUse" x1="524.76434" y1="708.45282" x2="500.54501" y2="316.05893">
      <stop offset="0" stop-color="#2730F2"/>
      <stop offset="1" stop-color="#376DF9"/>
    </linearGradient>

    <!-- Liquid glass shimmer: soft white glow for shutter blades -->
    <filter id="glass_blade" x="-8%" y="-8%" width="116%" height="116%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
      <feFlood flood-color="white" flood-opacity="0.25" result="glow"/>
      <feComposite in="glow" in2="blur" operator="in" result="softglow"/>
      <feMerge>
        <feMergeNode in="softglow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Liquid glass for the outer ring: frosted, slightly blurred edge -->
    <filter id="glass_ring" x="-4%" y="-4%" width="108%" height="108%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blur"/>
      <feFlood flood-color="white" flood-opacity="0.18" result="glow"/>
      <feComposite in="glow" in2="blur" operator="in" result="softglow"/>
      <feMerge>
        <feMergeNode in="softglow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Top-light gradient for glass sheen on shutter blades -->
    <linearGradient id="blade_sheen" gradientUnits="userSpaceOnUse" x1="512" y1="290" x2="512" y2="735">
      <stop offset="0" stop-color="white" stop-opacity="0.95"/>
      <stop offset="0.45" stop-color="white" stop-opacity="0.75"/>
      <stop offset="1" stop-color="white" stop-opacity="0.55"/>
    </linearGradient>

    <!-- Slightly less transparent for brackets (they need to stay readable) -->
    <linearGradient id="bracket_sheen" gradientUnits="userSpaceOnUse" x1="512" y1="228" x2="512" y2="798">
      <stop offset="0" stop-color="white" stop-opacity="0.92"/>
      <stop offset="1" stop-color="white" stop-opacity="0.72"/>
    </linearGradient>
  </defs>

